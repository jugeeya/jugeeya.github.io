name: Validate and merge tag submissions

# Tag submissions arrive as PRs opened by the broker (a GitHub App) on an
# in-repo branch under tags/data/**. This workflow checks the PR is benign,
# rebuilds the manifest, and auto-merges. Because the branch lives in this repo
# (not a fork), the default token can validate + merge safely. The validation
# never executes submitted content — it only parses the data files.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'tags/data/**'

permissions:
  contents: write
  pull-requests: write

# Don't pile up runs on the same PR.
concurrency:
  group: tag-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Validate submission
        run: |
          python3 scripts/validate_tags.py \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"

      - name: Rebuild manifest
        run: python3 scripts/build_tags_manifest.py

      - name: Commit manifest if it changed
        run: |
          if ! git diff --quiet -- tags/data/index.json; then
            git config user.name "tag-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tags/data/index.json
            git commit -m "Rebuild tag manifest"
            git push origin "HEAD:${{ github.head_ref }}"
          fi

      - name: Auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --squash --delete-branch
