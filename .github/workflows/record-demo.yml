name: Record demo video

# Re-records demo/demo.mp4 whenever the tool's source changes, and commits the
# fresh video. Records a locally-served copy of the just-pushed code (start.gg
# is mocked in demo.mjs when the target isn't the live site), so the video
# reflects the new code without waiting for a Pages deploy.
# Re-records only when the recorder itself changes, plus manual runs — the
# committed video adds ~7MB to history per recording, so this stays deliberate
# rather than firing on every tool tweak. Run it by hand (Actions → Run workflow)
# to refresh the video after a UI change you want reflected.
on:
  push:
    branches: [main]
    paths:
      - "demo/*.mjs"
  workflow_dispatch: {}

permissions:
  contents: write

# Only keep the newest recording in flight; superseded pushes cancel.
concurrency:
  group: record-demo
  cancel-in-progress: true

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install demo dependencies
        working-directory: demo
        run: npm install

      - name: Install Playwright Chromium
        working-directory: demo
        run: npx playwright install --with-deps chromium

      - name: Build fixture and record (against a local copy)
        working-directory: demo
        run: |
          set -e
          # Serve the repo so the demo drives the freshly-pushed code.
          (cd .. && python3 -m http.server 8000 >/tmp/httpd.log 2>&1 &)
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/tags/ >/dev/null && break
            sleep 1
          done
          ORIGIN=http://localhost:8000 node generate-fixture.mjs
          # demo.mjs writes demo.mp4 directly via playwright-recorder-plus
          # (clean JPEG-sourced capture + our own denoise/interpolate second
          # pass) -- no separate webm-to-mp4 conversion step needed anymore.
          # See the comment block at the top of demo.mjs for why: Chromium's
          # CDP screencast (what both Playwright's built-in recorder and this
          # library are built on) caps out at a real ~15-16fps in headless
          # regardless of resolution/quality, so recorder-plus can't buy more
          # real fps -- but its clean JPEG source lets our own second-pass
          # ffmpeg filter chain produce ~45% smaller files than re-encoding
          # Playwright's VP8 output, at equal crf and no measurable quality
          # loss (A/B'd via ffmpeg's difference blend mode before adopting).
          TARGET=http://localhost:8000/tags/ node demo.mjs

      - name: Generate poster
        working-directory: demo
        run: |
          set -e
          # Poster = the revealed submit section just after the opening fade
          # (the intro dark curtain has lifted by ~2.5s, before the first click).
          ffmpeg -y -ss 2.5 -i demo.mp4 -frames:v 1 -q:v 3 demo-poster.jpg

      - name: Commit the video + poster if they changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add demo/demo.mp4 demo/demo-poster.jpg
          if git diff --staged --quiet; then
            echo "No demo change."
          else
            git commit -m "chore: update demo video"
            git push
          fi
