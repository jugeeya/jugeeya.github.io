name: Record demo video

# Re-records demo/demo.mp4 whenever the tool's source changes, and commits the
# fresh video. Records a locally-served copy of the just-pushed code (start.gg
# is mocked in demo.mjs when the target isn't the live site), so the video
# reflects the new code without waiting for a Pages deploy.
on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "styles.css"
      - "tags/*.html"
      - "tags/*.js"
      - "tags/*.css"
      - "tags/wasm/**"
      - "demo/*.mjs"
  workflow_dispatch: {}

permissions:
  contents: write

# Only keep the newest recording in flight; superseded pushes cancel.
concurrency:
  group: record-demo
  cancel-in-progress: true

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install demo dependencies
        working-directory: demo
        run: npm install

      - name: Install Playwright Chromium
        working-directory: demo
        run: npx playwright install --with-deps chromium

      - name: Build fixture and record (against a local copy)
        working-directory: demo
        run: |
          set -e
          # Serve the repo so the demo drives the freshly-pushed code.
          (cd .. && python3 -m http.server 8000 >/tmp/httpd.log 2>&1 &)
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/tags/ >/dev/null && break
            sleep 1
          done
          ORIGIN=http://localhost:8000 node generate-fixture.mjs
          TARGET=http://localhost:8000/tags/ node demo.mjs

      - name: Convert WebM to MP4
        working-directory: demo
        run: |
          set -e
          webm=$(ls -t videos/*.webm | head -1)
          echo "Converting $webm -> demo.mp4"
          # -ss 0.5 trims the unavoidable blank first frame. The source is a
          # native 1920x1080 capture (supersampled via deviceScaleFactor 2).
          ffmpeg -y -ss 0.5 -i "$webm" \
            -vf "fps=30,scale=1920:1080:flags=lanczos" \
            -c:v libx264 -preset slow -pix_fmt yuv420p -crf 20 -movflags +faststart \
            demo.mp4
          # A poster frame (~3s in, past the intro card) for the click-to-play embed.
          ffmpeg -y -ss 3 -i demo.mp4 -frames:v 1 -q:v 3 demo-poster.jpg

      - name: Publish video + poster to the 'demo' release
        working-directory: demo
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          # Keep the video out of git history: store it as a rolling release
          # asset at a stable URL (releases/download/demo/demo.mp4).
          gh release view demo >/dev/null 2>&1 || \
            gh release create demo --title "Demo video (latest)" \
              --notes "Auto-updated walkthrough of the tag-sharing tool. Managed by record-demo.yml."
          rid=$(gh release view demo --json databaseId -q .databaseId)
          # Upload with an explicit content type. `gh release upload` defaults to
          # application/octet-stream, which iOS Safari won't play in <video> —
          # video/mp4 is required for mobile playback.
          publish() {
            name="$1"; ctype="$2"
            gh release delete-asset demo "$name" --yes 2>/dev/null || true
            curl -fsS -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Content-Type: ${ctype}" \
              --data-binary @"${name}" \
              "https://uploads.github.com/repos/${REPO}/releases/${rid}/assets?name=${name}" >/dev/null
          }
          publish demo.mp4 video/mp4
          publish demo-poster.jpg image/jpeg
