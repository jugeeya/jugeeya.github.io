name: Auto-retry Pages deploy

# GitHub's managed "pages build and deployment" occasionally fails at the deploy
# step with a transient "Deployment failed, try again later" even though the
# build succeeded (their backend has intermittent bad spells).
#
# That managed pipeline is a *dynamic* workflow, so `workflow_run` events don't
# fire for it and we can't react to its completion directly. Instead we poll on
# a schedule: if the newest deploy on main failed only at the deploy step (build
# passed), re-run it. Re-running once the backend is healthy succeeds, so stalls
# self-heal within roughly one poll interval without a manual nudge.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  actions: write

jobs:
  heal:
    runs-on: ubuntu-latest
    steps:
      - name: Re-run the latest Pages deploy if it stalled
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          run=$(gh api "repos/$REPO/actions/runs?branch=main&per_page=30" \
            --jq 'first(.workflow_runs[] | select(.name=="pages build and deployment"))')
          if [ -z "$run" ] || [ "$run" = "null" ]; then
            echo "No pages deploy run found."; exit 0
          fi
          id=$(echo "$run" | jq -r '.id')
          status=$(echo "$run" | jq -r '.status')
          concl=$(echo "$run" | jq -r '.conclusion')
          attempt=$(echo "$run" | jq -r '.run_attempt')
          echo "Latest pages deploy: id=$id status=$status conclusion=$concl attempt=$attempt"

          if [ "$status" != "completed" ] || [ "$concl" != "failure" ]; then
            echo "Latest deploy isn't a completed failure; nothing to do."; exit 0
          fi
          if [ "$attempt" -ge 10 ]; then
            echo "Already retried $attempt times; giving up until the next push."; exit 0
          fi

          # Only retry a transient deploy-step stall, never a real build failure.
          jobs=$(gh api "repos/$REPO/actions/runs/$id/jobs" --jq '[.jobs[] | {name, conclusion}]')
          build_ok=$(echo "$jobs" | jq -r 'any(.[]; .name=="build" and .conclusion=="success")')
          deploy_failed=$(echo "$jobs" | jq -r 'any(.[]; .name=="deploy" and .conclusion=="failure")')
          if [ "$build_ok" != "true" ] || [ "$deploy_failed" != "true" ]; then
            echo "Not a transient deploy stall (build_ok=$build_ok deploy_failed=$deploy_failed); leaving it."
            exit 0
          fi

          echo "Re-running failed deploy for run $id."
          gh api -X POST "repos/$REPO/actions/runs/$id/rerun-failed-jobs"
