name: Build MatchLogger install zips

# The console's install buttons link to matchlogger/dist/*.zip. This keeps
# those zips in sync with the mod/sender source whenever either changes, the
# same "commit the built artifact" pattern as build-wasm.yml.
on:
  push:
    branches: [main]
    paths:
      - "matchlogger/ue4ss/**"
      - "matchlogger/sender/**"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: matchlogger-dist
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build zips
        run: |
          set -euo pipefail
          mkdir -p matchlogger/dist
          rm -f matchlogger/dist/matchlogger-mod.zip matchlogger/dist/rivals-station-reporter.zip

          (cd matchlogger/ue4ss && zip -r -X ../dist/matchlogger-mod.zip UE4SS-settings.ini Mods)

          # rivals-station-reporter.zip: the launcher sits alone at the zip root
          # (the only thing you need to double-click); everything else is tucked
          # into _internal/ so extracting doesn't dump a pile of loose files next
          # to it. rivals-station-reporter.pyw finds _internal/ next to itself at
          # runtime, so no source patching is needed to build it this way.
          stage=$(mktemp -d)
          cp matchlogger/sender/rivals-station-reporter.pyw "$stage/"
          mkdir "$stage/_internal"
          cp matchlogger/sender/station_sender.py matchlogger/sender/station_widget.py \
             matchlogger/sender/config.example.json matchlogger/sender/README.md "$stage/_internal/"
          (cd "$stage" && zip -r -X "$GITHUB_WORKSPACE/matchlogger/dist/rivals-station-reporter.zip" rivals-station-reporter.pyw _internal)
          rm -rf "$stage"

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add matchlogger/dist/matchlogger-mod.zip matchlogger/dist/rivals-station-reporter.zip
          if git diff --cached --quiet; then
            echo "No changes to the install zips."
            exit 0
          fi
          git commit -m "chore: rebuild MatchLogger install zips"
          git push
